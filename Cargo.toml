[package]
name = "rs-max"
version = "0.1.0"
edition = "2024"
description = "Maximum strictness Rust project"
license = "MIT"
repository = "https://github.com/user/rs-max"
readme = "README.md"
keywords = ["template"]
categories = ["development-tools"]

[dependencies]

[lints.rust]
warnings = "deny"
unsafe_code = "forbid"
missing_docs = "deny"
elided_lifetimes_in_paths = "deny"
explicit_outlives_requirements = "deny"
missing_copy_implementations = "deny"
missing_debug_implementations = "deny"
non_ascii_idents = "deny"
redundant_lifetimes = "deny"
rust_2018_idioms = { level = "deny", priority = -1 }
single_use_lifetimes = "deny"
trivial_casts = "deny"
trivial_numeric_casts = "deny"
unreachable_pub = "deny"
unsafe_op_in_unsafe_fn = "deny"
unused_crate_dependencies = "deny"
unused_extern_crates = "deny"
unused_import_braces = "deny"
unused_lifetimes = "deny"
unused_macro_rules = "deny"
unused_qualifications = "deny"
unused_results = "deny"
variant_size_differences = "deny"
let_underscore_drop = "deny"
macro_use_extern_crate = "deny"
meta_variable_misuse = "deny"
redundant_imports = "deny"
unit_bindings = "deny"

[lints.clippy]
# Everything on, max severity
all = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }
nursery = { level = "deny", priority = -1 }
cargo = { level = "deny", priority = -1 }
restriction = { level = "deny", priority = -1 }

# Conflicts and false positives — allow only what's unavoidable
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
missing_const_for_fn = "allow"
blanket_clippy_restriction_lints = "allow" # meta-lint about enabling restriction group
implicit_return = "allow"                  # conflicts with Rust convention
question_mark_used = "allow"              # conflicts with idiomatic ? operator
separated_literal_suffix = "allow"        # conflicts with unseparated_literal_suffix
ref_patterns = "allow"                    # conflicts with pattern_type_mismatch
pub_with_shorthand = "allow"              # conflicts with pub_without_shorthand
single_call_fn = "allow"                  # too noisy, flags valid abstractions
exhaustive_enums = "allow"                # conflicts with non_exhaustive_omitted_patterns
exhaustive_structs = "allow"              # same reason
self_named_module_files = "allow"         # conflicts with mod_module_files

[profile.release]
lto = "fat"
codegen-units = 1
panic = "abort"
strip = "symbols"
opt-level = 3

[profile.dev.package."*"]
opt-level = 2
