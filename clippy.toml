cognitive-complexity-threshold = 10
too-many-arguments-threshold = 5
too-many-lines-threshold = 60
type-complexity-threshold = 200
excessive-nesting-threshold = 4
max-fn-params-bools = 1
max-struct-bools = 2
enum-variant-size-threshold = 128
large-error-threshold = 64
future-size-threshold = 4096

allow-unwrap-in-tests = false
allow-expect-in-tests = false
allow-dbg-in-tests = false
allow-print-in-tests = false

min-ident-chars-threshold = 2
allowed-idents-below-min-chars = ["i", "j", "x", "y", "n", "_"]
disallowed-names = ["foo", "bar", "baz", "quux", "tmp", "temp"]

warn-on-all-wildcard-imports = true
check-private-items = true
accept-comment-above-attributes = true
accept-comment-above-statement = true
missing-docs-in-crate-items = true

doc-valid-idents = ["GraphQL", "GitHub", "JavaScript", "TypeScript", "WebSocket", "MongoDB", "PostgreSQL", "MySQL", "SQLite", "Redis", "OAuth", "OpenAPI", "gRPC", "WebAssembly"]
